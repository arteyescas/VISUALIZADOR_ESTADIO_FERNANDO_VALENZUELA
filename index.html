<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Estadio Fernando Valenzuela (Dynamic)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .contenedor {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* Estilos del Mapa */
        .seccion-mapa {
            flex: 1;
        }
        .seccion-estadio {
            transition: all 0.3s ease;
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2;
        }
        .seccion-estadio:hover {
            fill: #F39C12; /* Color Naranjero al pasar el ratón */
            opacity: 0.8;
        }
        .activo {
            fill: #E67E22 !important;
            stroke: #333;
        }
        /* Estilos de la Tarjeta de Información */
        .seccion-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .tarjeta {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            display: none; 
        }
        .tarjeta img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #eee;
        }
        .tarjeta-contenido {
            padding: 20px;
        }
        .tarjeta h2 {
            margin: 0 0 10px 0;
            color: #d35400;
        }
        .etiqueta {
            display: inline-block;
            background: #eee;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            margin-right: 5px;
        }
        #mensaje-inicial {
            text-align: center;
            color: #7f8c8d;
            margin-top: 50px;
        }
        /* Estado de carga */
        .cargando {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="seccion-mapa id="mapa-bloque" class="cargando">
            <h3>Selecciona una zona:</h3>
            <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
                <path d="M300,350 L200,250 L300,150 L400,250 Z" fill="#27ae60" />
                <path d="M300,150 Q350,100 450,200 L400,250 Z" fill="#2ecc71" />
                <path d="M300,150 Q250,100 150,200 L200,250 Z" fill="#2ecc71" />
                
                <path id="sec-central" d="M260,370 L340,370 Q370,390 400,380 L200,380 Q230,390 260,370 Z" fill="#3498db" class="seccion-estadio" />
                <path id="sec-lateral-primera" d="M420,270 L480,210 L510,240 L450,300 Z" fill="#9b59b6" class="seccion-estadio" />
                <path id="sec-bleachers" d="M220,100 Q300,50 380,100 L420,60 Q300,0 180,60 Z" fill="#e74c3c" class="seccion-estadio" />
            </svg>
        </div>

        <div class="seccion-info">
            <div id="mensaje-inicial">
                <h2>Cargando datos del estadio...</h2>
                <p>Por favor espera un momento.</p>
            </div>

            <div id="tarjeta-info" class="tarjeta">
                <img id="info-imagen" src="" alt="Vista desde el asiento">
                <div class="tarjeta-contenido">
                    <h2 id="info-nombre">Nombre de la sección</h2>
                    <span class="etiqueta" id="info-capacidad">Capacidad: --</span>
                    <span class="etiqueta" id="info-sol">Sol: --</span>
                    <p id="info-descripcion">Descripción de la vista irá aquí.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN: PEGA AQUÍ TU ENLACE CSV
        // ==========================================
        const URL_HOJA_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-mcbGirsiy1FulMFbt0sb03gzEFM6dkQRdo74GDqyGXwxCHSFwlJMJC2J_I8LVmLcUieicru1OiFA/pub?gid=0&single=true&output=csv';

        let baseDeDatos = {};

        // Referencias a elementos del DOM
        const mapaBloque = document.getElementById('mapa-bloque');
        const zonasEstadio = document.querySelectorAll('.seccion-estadio');
        const tarjetaInfo = document.getElementById('tarjeta-info');
        const mensajeInicial = document.getElementById('mensaje-inicial');
        
        const uiNombre = document.getElementById('info-nombre');
        const uiImagen = document.getElementById('info-imagen');
        const uiCapacidad = document.getElementById('info-capacidad');
        const uiSol = document.getElementById('info-sol');
        const uiDescripcion = document.getElementById('info-descripcion');

        // Función robusta para procesar el texto CSV respetando comillas
        function procesarCSV(texto) {
            const lineas = [];
            let fila = [""];
            let dentroDeComillas = false;

            for (let i = 0; i < texto.length; i++) {
                const caracter = texto[i];
                const siguiente = texto[i + 1];

                if (caracter === '"') {
                    if (dentroDeComillas && siguiente === '"') {
                        fila[fila.length - 1] += '"';
                        i++; 
                    } else {
                        dentroDeComillas = !dentroDeComillas;
                    }
                } else if (caracter === ',' && !dentroDeComillas) {
                    fila.push('');
                } else if ((caracter === '\r' || caracter === '\n') && !dentroDeComillas) {
                    if (caracter === '\r' && siguiente === '\n') { i++; }
                    lineas.push(fila);
                    fila = [''];
                } else {
                    fila[fila.length - 1] += caracter;
                }
            }
            if (fila.length > 1 || fila[0] !== '') { lineas.push(fila); }
            
            const resultado = {};
            if (lineas.length < 2) return resultado;

            // Omitimos la fila 0 (encabezados) y recorremos los registros
            for (let i = 1; i < lineas.length; i++) {
                const r = lineas[i];
                if (r.length < 6) continue; // Ignora líneas incompletas
                
                const idZona = r[0].trim();
                resultado[idZona] = {
                    nombre: r[1],
                    capacidad_aprox: r[2],
                    exposicion_sol: r[3],
                    imagen_url: r[4],
                    descripcion_vista: r[5]
                };
            }
            return resultado;
        }

        // Conexión asíncrona con la "API" de Google Sheets
        async function inicializarAplicacion() {
            try {
                const respuesta = await fetch(URL_HOJA_CSV);
                if (!respuesta.ok) throw new Error("Error en la descarga de datos");
                
                const textoCSV = await respuesta.text();
                baseDeDatos = procesarCSV(textoCSV);

                // Cambiar el mensaje inicial tras una carga exitosa
                mensajeInicial.innerHTML = `<h2>Haz clic en una sección del mapa</h2><p>La vista desde el asiento aparecerá aquí.</p>`;
                mapaBloque.classList.remove('cargando');

                // Habilitar los eventos de clic
                configurarEventosMapa();
            } catch (error) {
                console.error("Detalles del error:", error);
                mensajeInicial.innerHTML = `<h2 style="color: #c0392b;">Error de conexión</h2><p>No se pudieron obtener los datos desde Google Sheets. Revisa la configuración de uso compartido.</p>`;
            }
        }

        // Lógica de interactividad del mapa
        function configurarEventosMapa() {
            zonasEstadio.forEach(zona => {
                zona.addEventListener('click', function() {
                    zonasEstadio.forEach(z => z.classList.remove('activo'));
                    this.classList.add('activo');

                    const idZona = this.getAttribute('id');
                    const datos = baseDeDatos[idZona];

                    if (datos) {
                        mensajeInicial.style.display = 'none';
                        tarjetaInfo.style.display = 'block';

                        uiNombre.textContent = datos.nombre;
                        uiImagen.src = datos.imagen_url || 'https://placehold.co/600x400?text=Sin+Imagen';
                        uiImagen.alt = "Vista desde " + datos.nombre;
                        uiCapacidad.textContent = "Aforo: " + datos.capacidad_aprox;
                        uiSol.textContent = "Sol: " + datos.exposicion_sol;
                        uiDescripcion.textContent = datos.descripcion_vista;
                    } else {
                        console.warn(`No se encontraron datos en el CSV para el id_zona: "${idZona}"`);
                    }
                });
            });
        }

        // Arrancar la app al cargar la página
        window.addEventListener('DOMContentLoaded', inicializarAplicacion);
    </script>
</body>
</html>
